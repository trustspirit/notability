name: MeetingScribe
options:
  bundleIdPrefix: com.meetingscribe
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.38.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.0.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  MeetingScribe:
    type: application
    platform: macOS
    sources:
      - MeetingScribe
    settings:
      base:
        INFOPLIST_FILE: MeetingScribe/Info.plist
        CODE_SIGN_ENTITLEMENTS: MeetingScribe/MeetingScribe.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.notability.app
        PRODUCT_NAME: Notability
        PRODUCT_MODULE_NAME: MeetingScribe
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - sdk: ScreenCaptureKit.framework
      - sdk: AVFoundation.framework
      - package: Sparkle
        product: Sparkle

  MeetingScribeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - MeetingScribeTests
    dependencies:
      - target: MeetingScribe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meetingscribe.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Notability.app/Contents/MacOS/Notability"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  MeetingScribe:
    build:
      targets:
        MeetingScribe: all
        MeetingScribeTests: [test]
    test:
      targets:
        - MeetingScribeTests
      config: Debug
